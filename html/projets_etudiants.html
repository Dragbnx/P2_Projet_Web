                <!-- Catalogue des projets -->
                <main class="catalog-section">
                    <div class="catalog-container">
                        <div class="catalog-header">
                            <h1> Catalogue des projets étudiants</h1>
                            <p class="catalog-sub">Parcourez, recherchez et triez les projets réalisés par les étudiants.</p>
                        </div>

                        <div class="catalog-controls">
                            <input id="search" type="search" placeholder="Rechercher des projets par titre, tag ou auteur..." />
                            <select id="sort">
                                <option value="newest">Plus récent</option>
                                <option value="oldest">Plus ancien</option>
                                <option value="title-asc">Titre A → Z</option>
                                <option value="title-desc">Titre Z → A</option>
                            </select>
                            <button id="reset" type="button">Réinitialiser</button>
                        </div>

                        <div id="projects" class="project-grid" aria-live="polite"></div>
                    </div>
